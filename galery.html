<div class="page-hero">

<!-- Gallery Filter Tabs -->
<div class="section-dark py-4">

    <div class="d-flex gap-2 flex-wrap justify-content-center" id="galleryTabs">
      <button class="page-btn active" data-tab="all" style="width:auto;padding:0 20px;">All</button>

</div>

<main class="section-light py-5">

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">

  <div class="lightbox-content" id="lightboxContent">
    <div id="lightboxEmoji" style="font-size:6rem;text-align:center;padding:2rem;"></div>
    <div id="lightboxLabel" style="font-family:var(--font-display);font-size:.9rem;color:var(--blue-bright);text-align:center;letter-spacing:1px;padding-bottom:1.5rem;"></div>
  </div>
</div>

<!-- Instagram CTA -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  const GALLERY_ITEMS = [
    { emoji: '🏴‍☠️', label: 'Luffy Keychain', tab: 'products' },
    { emoji: '💍', label: 'MF Doom Ring', tab: 'products' },
    { emoji: '💎', label: 'Blue Lapis Necklace', tab: 'products' },
    { emoji: '✝️', label: 'Cross Pendant', tab: 'products' },
    { emoji: '👕', label: 'Anime Night T-Shirt', tab: 'products' },
    { emoji: '⭐', label: 'Dragon Ball Set', tab: 'products' },
    { emoji: '😊', label: 'Happy Client', tab: 'clients' },
    { emoji: '🤩', label: 'Client Showcase', tab: 'clients' },
    { emoji: '😎', label: 'Ring Collection', tab: 'clients' },
    { emoji: '🎁', label: 'Gift Unboxing', tab: 'clients' },
    { emoji: '🎉', label: 'Anime Night Event', tab: 'events' },
    { emoji: '🌙', label: 'Night Atmosphere', tab: 'events' },
    { emoji: '🎊', label: 'Giveaway Night', tab: 'events' },
    { emoji: '🌸', label: 'Pressed Flowers', tab: 'products' },
    { emoji: '🌀', label: 'Naruto Collection', tab: 'products' },
    { emoji: '⚔️', label: 'AoT Badge', tab: 'products' },
    { emoji: '👜', label: 'Anime Wallet', tab: 'products' },
    { emoji: '🎭', label: 'Event Stage', tab: 'events' },
  ];

  let activeTab = 'all';

  function renderGallery() {
    const grid = document.getElementById('galleryGrid');
    const filtered = activeTab === 'all' ? GALLERY_ITEMS : GALLERY_ITEMS.filter(i => i.tab === activeTab);
    grid.innerHTML = filtered.map((item, idx) => `
      <div class="gallery-item" data-idx="${idx}" data-tab="${item.tab}">
        <div class="gallery-item-inner" style="min-height:${idx % 3 === 0 ? '220px' : '150px'};">
          <span style="font-size:3.5rem;">${item.emoji}</span>
          <span style="font-family:var(--font-body);font-size:.75rem;font-weight:600;color:var(--white-60);letter-spacing:1px;">${item.label}</span>
        </div>
      </div>
    `).join('');

    // Lightbox bindings
    grid.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('click', () => {
        const idx = parseInt(item.dataset.idx);
        const filtered2 = activeTab === 'all' ? GALLERY_ITEMS : GALLERY_ITEMS.filter(i => i.tab === activeTab);
        document.getElementById('lightboxEmoji').textContent = filtered2[idx].emoji;
        document.getElementById('lightboxLabel').textContent = filtered2[idx].label;
        document.getElementById('lightbox').classList.add('active');
      });
    });
  }

  // Tabs
  document.querySelectorAll('#galleryTabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#galleryTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      renderGallery();
    });
  });

  // Lightbox close
  document.getElementById('lightboxClose').addEventListener('click', () => document.getElementById('lightbox').classList.remove('active'));
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('active'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active'); });

  renderGallery();
</script>
</body>
</html>
