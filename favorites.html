<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites — AnimeEngeek</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span class="brand-icon">⟨</span>ANIME<span class="brand-accent">ENGEEK</span><span class="brand-icon">⟩</span></a>
    <div class="nav-icons d-flex align-items-center gap-3">
      <a href="search.html" class="nav-icon-btn"><i class="bi bi-search"></i></a>
      <a href="favorites.html" class="nav-icon-btn"><i class="bi bi-heart-fill" style="color:#f87171;"></i><span class="badge-dot" id="favCount">0</span></a>
      <a href="cart.html" class="nav-icon-btn"><i class="bi bi-bag"></i><span class="badge-dot" id="cartCount">0</span></a>
      <a href="orders.html" class="nav-icon-btn"><i class="bi bi-box-seam"></i></a>
      <a href="login.html" class="nav-icon-btn" id="profileBtn"><i class="bi bi-person-circle"></i></a>
      <a href="https://www.instagram.com/animeengeek.ks" target="_blank" class="nav-icon-btn insta-btn"><i class="bi bi-instagram"></i></a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="container">
    <span class="section-tag">Saved Items</span>
    <h1 class="section-title mt-2"><i class="bi bi-heart-fill me-3" style="color:#f87171;"></i>My <span class="text-gradient">Favorites</span></h1>
  </div>
</div>

<main class="section-dark py-5">
  <div class="container">
    <div class="empty-state" id="favEmpty" style="display:none;">
      <div class="empty-icon">💔</div>
      <h3>No favorites yet</h3>
      <p>Heart items while browsing to save them here.</p>
      <a href="shop.html" class="btn btn-primary-custom mt-3">Browse Shop</a>
    </div>
    <div class="row g-4" id="favGrid"></div>
  </div>
</main>

<footer class="site-footer pt-3 pb-3">
  <div class="container"><p class="footer-copy text-center">&copy; 2025 AnimeEngeek</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/products.js"></script>
<script>
  function renderFavs() {
    const favIds = getFavs();
    const grid = document.getElementById('favGrid');
    const empty = document.getElementById('favEmpty');
    if (favIds.length === 0) { empty.style.display = 'block'; grid.innerHTML = ''; return; }
    empty.style.display = 'none';
    const favProducts = PRODUCTS.filter(p => favIds.includes(p.id));
    grid.innerHTML = favProducts.map(renderProductCard).join('');
    bindCartFav();
    // Re-render on fav change
    document.querySelectorAll('.product-fav-btn').forEach(btn => {
      btn.addEventListener('click', () => setTimeout(renderFavs, 100));
    });
  }
  renderFavs();
</script>
</body>
</html>
