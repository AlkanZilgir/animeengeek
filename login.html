<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AnimeEngeek</title>
  <meta name="description" content="Login to your AnimeEngeek account to track orders, manage favorites and more." />
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html">
      <span class="brand-icon">⟨</span>ANIME<span class="brand-accent">ENGEEK</span><span class="brand-icon">⟩</span>
    </a>
    <div class="nav-icons d-flex align-items-center gap-3">
      <a href="register.html" class="btn btn-outline-custom" style="padding:8px 20px;font-size:0.85rem;">Register</a>
      <a href="https://www.instagram.com/animeengeek.ks" target="_blank" class="nav-icon-btn insta-btn"><i class="bi bi-instagram"></i></a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <!-- Logo -->
    <div class="text-center mb-4">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">⟨AE⟩</div>
      <h1 class="text-gradient" style="font-size:1.6rem;">Welcome Back</h1>
      <p class="text-muted-light" style="font-size:.9rem;font-family:var(--font-text);">Sign in to your AnimeEngeek account</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group-custom">
        <label class="form-label-custom" for="loginEmail">Email Address</label>
        <div class="input-icon-wrap">
          <input type="email" class="form-control-custom" id="loginEmail" placeholder="your@email.com" autocomplete="email" required />
          <i class="bi bi-envelope input-icon"></i>
        </div>
        <div class="form-error" id="emailError">Please enter a valid email address.</div>
      </div>

      <div class="form-group-custom">
        <label class="form-label-custom" for="loginPassword">Password</label>
        <div class="input-icon-wrap">
          <input type="password" class="form-control-custom" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required style="padding-right:44px;" />
          <i class="bi bi-eye input-icon" id="togglePw"></i>
        </div>
        <div class="form-error" id="pwError">Password must be at least 6 characters.</div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <label class="d-flex align-items-center gap-2" style="cursor:pointer;font-family:var(--font-body);font-size:.9rem;color:var(--white-60);">
          <input type="checkbox" id="rememberMe" style="accent-color:var(--blue-bright);" />
          Remember me
        </label>
        <a href="#" style="font-size:.85rem;color:var(--blue-bright);text-decoration:none;font-family:var(--font-body);">Forgot password?</a>
      </div>

      <div class="form-error text-center mb-3" id="loginError" style="font-size:.9rem;"></div>
      <div class="form-feedback text-center mb-3" id="loginSuccess" style="color:#34d399;font-size:.9rem;display:none;"></div>

      <button type="submit" class="btn-primary-custom w-100" style="border-radius:12px;padding:14px;font-size:1rem;">
        Sign In <i class="bi bi-arrow-right ms-2"></i>
      </button>
    </form>

    <div class="divider-text">or continue with</div>

    <a href="https://www.instagram.com/animeengeek.ks" target="_blank" class="btn-instagram w-100 text-center" style="border-radius:12px;padding:14px;font-size:.95rem;display:block;text-decoration:none;">
      <i class="bi bi-instagram me-2"></i>Follow us on Instagram
    </a>

    <p class="text-center mt-4" style="color:var(--white-60);font-family:var(--font-text);font-size:.9rem;">
      Don't have an account? <a href="register.html" style="color:var(--blue-bright);text-decoration:none;font-weight:600;">Create one →</a>
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script>
  // Toggle password visibility
  const togglePw = document.getElementById('togglePw');
  const pwInput = document.getElementById('loginPassword');
  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    togglePw.className = show ? 'bi bi-eye-slash input-icon' : 'bi bi-eye input-icon';
  });

  // Form validation & submit
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const emailErr = document.getElementById('emailError');
    const pwErr = document.getElementById('pwError');
    const loginErr = document.getElementById('loginError');
    const loginSuccess = document.getElementById('loginSuccess');

    let valid = true;
    emailErr.classList.remove('show');
    pwErr.classList.remove('show');
    loginErr.classList.remove('show');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.classList.add('show');
      valid = false;
    }
    if (!password || password.length < 6) {
      pwErr.classList.add('show');
      valid = false;
    }

    if (!valid) return;

    // Check against stored users
    const users = JSON.parse(localStorage.getItem('ag_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      loginErr.textContent = 'Invalid email or password. Try demo@anime.com / password123';
      loginErr.classList.add('show');
      return;
    }

    saveUser({ name: user.name, email: user.email });
    loginSuccess.textContent = `Welcome back, ${user.name}! Redirecting...`;
    loginSuccess.style.display = 'block';
    setTimeout(() => { window.location.href = '../index.html'; }, 1200);
  });

  // Create demo user if none exist
  (function() {
    const users = JSON.parse(localStorage.getItem('ag_users') || '[]');
    if (!users.find(u => u.email === 'demo@anime.com')) {
      users.push({ name: 'Demo Fan', email: 'demo@anime.com', password: 'password123' });
      localStorage.setItem('ag_users', JSON.stringify(users));
    }
  })();
</script>
</body>
</html>
